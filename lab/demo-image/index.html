<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Container</title>
    <style>
      :root {
        --bg: #0b0e14; --panel: #11161f; --border: #1e2733;
        --text: #c7d0db; --muted: #6b7889; --ok: #4fd1c5; --signal: #e8a33d;
        --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg); color: var(--text); font-family: var(--mono);
        display: flex; align-items: center; justify-content: center; padding: 24px;
      }
      .card {
        border: 1px solid var(--border); background: var(--panel);
        border-radius: 10px; padding: 30px; max-width: 440px; width: 100%;
      }
      .live { display: inline-flex; align-items: center; gap: 8px;
        font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ok); }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok);
        box-shadow: 0 0 8px var(--ok); animation: p 1.4s infinite; }
      @keyframes p { 50% { opacity: 0.3; } }
      h1 { font-size: 20px; margin: 16px 0 8px; color: #eef2f7; }
      p { color: var(--muted); font-size: 13px; line-height: 1.6; margin: 0 0 18px; }
      .kv { display: grid; grid-template-columns: auto 1fr; gap: 6px 16px;
        font-size: 12px; border-top: 1px solid var(--border); padding-top: 16px; }
      .kv .k { color: var(--muted); }
      .kv .v { color: var(--text); }
      .clock { color: var(--signal); }
      @media (prefers-reduced-motion: reduce) { .dot { animation: none; } }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="live"><span class="dot"></span> container running</span>
      <h1>This page is served from inside a container.</h1>
      <p>
        It was spun up just for your session and is fully isolated. When your
        session expires, this container is destroyed automatically.
      </p>
      <div class="kv">
        <span class="k">served by</span><span class="v">python http.server</span>
        <span class="k">isolation</span><span class="v">all caps dropped · no-new-privileges</span>
        <span class="k">local time</span><span class="v clock" id="clock">—</span>
      </div>
    </div>
    <script>
      const el = document.getElementById("clock");
      setInterval(() => (el.textContent = new Date().toLocaleTimeString()), 1000);
    </script>
  </body>
</html>
